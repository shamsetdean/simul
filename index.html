<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>simul — souvenirs immersifs</title>
<meta name="description" content="Capture un souvenir avec les deux cameras a la fois, ancre sur une carte, avec les personnes presentes.">
<meta name="theme-color" content="#f9f5ec">

<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
<link rel="icon" href="favicon-16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<meta property="og:type" content="website">
<meta property="og:title" content="simul — souvenirs immersifs">
<meta property="og:description" content="Capture un souvenir avec les deux cameras a la fois, ancre sur une carte, avec les personnes presentes.">
<meta property="og:image" content="og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="simul — souvenirs immersifs">
<meta name="twitter:description" content="Capture un souvenir avec les deux cameras a la fois, ancre sur une carte, avec les personnes presentes.">
<meta name="twitter:image" content="og-image.png">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ============ VUE CAPTURE ============ -->
  <section class="view active" id="view-capture">
    <div class="topbar">
      <span class="brand">simul</span>
      <span style="width:40px"></span>
    </div>

    <div class="capture-stage">
      <video id="video-main" autoplay playsinline muted></video>
      <video id="video-pip" autoplay playsinline muted style="display:none"></video>
      <canvas id="pip-canvas" style="display:none"></canvas>

      <div class="capture-badge" id="capture-mode-badge">
        <span class="dot"></span>
        <span id="capture-mode-label">Initialisation…</span>
      </div>
    </div>

    <div class="glass-controls">
      <button type="button" class="glass-btn" id="btn-open-gallery">
        <span class="circle">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
        </span>
        <span class="label">Galerie</span>
      </button>

      <button type="button" class="glass-btn active" id="btn-mode-photo">
        <span class="circle">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="13" r="3"/><path d="M4 8h3l2-3h6l2 3h3v11H4z"/></svg>
        </span>
        <span class="label">Photo</span>
      </button>

      <button type="button" class="glass-btn" id="btn-mode-video">
        <span class="circle">
          <svg class="icon" viewBox="0 0 24 24"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>
        </span>
        <span class="label">Video</span>
      </button>

      <button type="button" class="glass-btn" id="btn-preview-swap" style="display:none;">
        <span class="circle">
          <svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
        </span>
        <span class="label">Aperçu</span>
      </button>

      <button type="button" class="glass-btn shutter-glass" id="btn-shutter">
        <span class="circle">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
        </span>
        <span class="label">Capturer</span>
      </button>
    </div>
  </section>

  <!-- ============ VUE REVUE / ENREGISTREMENT ============ -->
  <section class="view" id="view-review">
    <div class="topbar">
      <button class="icon-btn" id="btn-review-back" aria-label="Retour">
        <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      </button>
      <span class="eyebrow">Nouveau souvenir</span>
      <span style="width:40px"></span>
    </div>

    <div class="sheet">
      <div class="sheet-media" id="review-media-wrap"></div>

      <div class="map-strip" id="review-map-strip">
        <img id="review-map-img" alt="Carte du lieu">
        <svg class="icon pin" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M12 22s7-7.4 7-12.5A7 7 0 0 0 5 9.5C5 14.6 12 22 12 22z"/><circle cx="12" cy="9.5" r="2.5" fill="#f9f5ec"/>
        </svg>
        <span class="meta" id="review-map-meta">Localisation…</span>
      </div>

      <div class="field">
        <label for="tag-input-field">
          <svg class="icon" viewBox="0 0 24 24" style="width:13px;height:13px;display:inline;vertical-align:-2px;margin-right:4px"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Personnes presentes
        </label>
        <div class="field-row">
          <div class="tag-input" id="tag-input-box">
            <input type="text" id="tag-input-field" placeholder="Ajouter un prenom…">
          </div>
          <button type="button" class="btn-contacts" id="btn-pick-contacts" style="display:none;" aria-label="Choisir depuis les contacts">
            <svg class="icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/><path d="M21 8v6"/><path d="M18 11h6"/></svg>
          </button>
        </div>
        <div class="tag-suggestions" id="tag-suggestions"></div>
      </div>

      <div class="action-row">
        <button class="btn btn-ghost" id="btn-discard">
          <svg class="icon" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
          Supprimer
        </button>
        <button class="btn btn-primary" id="btn-save">
          <svg class="icon" viewBox="0 0 24 24" style="width:16px;height:16px;color:inherit"><path d="M20 6 9 17l-5-5"/></svg>
          Garder
        </button>
      </div>
    </div>
  </section>

  <!-- ============ VUE GALERIE ============ -->
  <section class="view" id="view-gallery">
    <div class="topbar">
      <button class="icon-btn" id="btn-gallery-back" aria-label="Retour">
        <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      </button>
      <span class="brand">tes souvenirs</span>
      <button class="icon-btn" id="btn-toggle-map" aria-label="Voir sur la carte">
        <svg class="icon" viewBox="0 0 24 24"><path d="M9 20l-5.447-2.724A1 1 0 0 1 3 16.382V5.618a1 1 0 0 1 1.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0 0 21 18.382V7.618a1 1 0 0 0-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
      </button>
    </div>

    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="gallery-map" id="gallery-map"></div>

    <div class="empty-state" id="gallery-empty" style="display:none">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
      <h3 style="font-size:17px">Aucun souvenir pour l'instant</h3>
      <p>Capture ton premier moment a deux cameras, il apparaitra ici.</p>
    </div>
  </section>

  <!-- ============ VUE DETAIL ============ -->
  <section class="view" id="view-detail">
    <div class="topbar">
      <button class="icon-btn" id="btn-detail-back" aria-label="Retour">
        <svg class="icon" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      </button>
      <span class="eyebrow" id="detail-date"></span>
      <button class="icon-btn" id="btn-detail-delete" aria-label="Supprimer">
        <svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
      </button>
    </div>

    <div class="sheet">
      <div class="sheet-media" id="detail-media-wrap"></div>

      <div class="map-strip" id="detail-map-strip">
        <img id="detail-map-img" alt="Carte du lieu">
        <svg class="icon pin" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M12 22s7-7.4 7-12.5A7 7 0 0 0 5 9.5C5 14.6 12 22 12 22z"/><circle cx="12" cy="9.5" r="2.5" fill="#f9f5ec"/>
        </svg>
        <span class="meta" id="detail-map-meta"></span>
      </div>

      <div class="tag-suggestions" id="detail-tags"></div>

      <div class="action-row">
        <button class="btn btn-primary" id="btn-detail-share">
          <svg class="icon" viewBox="0 0 24 24" style="width:16px;height:16px"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4"/><path d="m15.4 6.5-6.8 4"/></svg>
          Partager en SMS
        </button>
      </div>
    </div>
  </section>

</div>

<div class="location-sheet-backdrop" id="location-sheet-backdrop">
  <div class="location-sheet">
    <div class="grabber"></div>
    <div class="location-sheet-hero" id="location-sheet-hero">
      <img id="location-sheet-img" alt="Photo agrandie du lieu">
    </div>
    <div class="location-sheet-meta">
      <span class="eyebrow" id="location-sheet-coords"></span>
      <span class="location-sheet-count" id="location-sheet-count"></span>
    </div>
    <div class="location-mini-grid" id="location-mini-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/storage.js"></script>
<script src="js/capture.js"></script>
<script src="js/map.js"></script>
<script src="js/share.js"></script>
<script src="js/app.js"></script>
</body>
</html>
